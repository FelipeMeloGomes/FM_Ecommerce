name: CI

on:
  push:
    branches:
      - main
      - beta
  pull_request:
    branches:
      - main
      - beta

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (LTS mais recente)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.30.0
          run_install: false

      - name: Cache dependências (node_modules)
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-deps-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-deps-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Rodar lint
        run: pnpm run lint

      - name: Rodar testes unitários
        run: pnpm run test

      - name: Rodar build
        run: pnpm run build
